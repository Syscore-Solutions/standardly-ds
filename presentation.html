<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Standardly Design System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reset.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/theme/black.min.css">
  <style>
    .reveal { font-family: system-ui, sans-serif; }
    .reveal h1, .reveal h2, .reveal h3 { font-family: system-ui, sans-serif; font-weight: 600; text-transform: none; }
    .placeholder { text-align: center; color: #99a0ae; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section>
        <h1>Presentation TBD</h1>
        <p class="placeholder">Content will be added once directions are finalized.</p>
      </section>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      transition: 'fade',
      controls: true,
      progress: true
    });
  </script>
</body>
</html>
